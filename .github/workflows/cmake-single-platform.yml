# cmake-single-platform.yml
name: CMake on a single platform

on:
  push:
    branches: [ "master" ]
    paths:
      - 'C/**'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake-single-platform.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'C/**'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake-single-platform.yml'

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Find CMake project
      id: cmake
      shell: bash
      run: |
        cmake_file="$(find C -name CMakeLists.txt | head -n 1)"
        if [ -n "$cmake_file" ]; then
          project_dir="$(dirname "$cmake_file")"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "build_dir=$project_dir/build" >> "$GITHUB_OUTPUT"
          echo "Found CMake project in $project_dir"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No CMakeLists.txt found under C/"
        fi

    - name: Configure CMake
      if: steps.cmake.outputs.found == 'true'
      run: cmake -S "${{ steps.cmake.outputs.project_dir }}" -B "${{ steps.cmake.outputs.build_dir }}" -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      if: steps.cmake.outputs.found == 'true'
      run: cmake --build "${{ steps.cmake.outputs.build_dir }}" --config ${{ env.BUILD_TYPE }}

    - name: Test
      if: steps.cmake.outputs.found == 'true'
      working-directory: ${{ steps.cmake.outputs.build_dir }}
      run: ctest -C ${{ env.BUILD_TYPE }} || true

    - name: Skip when no CMake project exists
      if: steps.cmake.outputs.found != 'true'
      run: echo "No CMake project found under C/. Skipping."
