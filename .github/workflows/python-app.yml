# python-app.yml
name: Python application

on:
  push:
    branches: [ "master" ]
    paths:
      - 'Python/**'
      - 'requirements.txt'
      - '.github/workflows/python-app.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'Python/**'
      - 'requirements.txt'
      - '.github/workflows/python-app.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for Python files
      id: pycheck
      shell: bash
      run: |
        if find Python -type f -name "*.py" | grep -q .; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No Python files found under Python/."
        fi

    - name: Set up Python 3.10
      if: steps.pycheck.outputs.found == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      if: steps.pycheck.outputs.found == 'true'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
        if [ -f "Python/requirements.txt" ]; then pip install -r Python/requirements.txt; fi

    - name: Lint with flake8
      if: steps.pycheck.outputs.found == 'true'
      run: |
        flake8 Python --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 Python --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      if: steps.pycheck.outputs.found == 'true'
      run: pytest Python || true

    - name: Skip when no Python files exist
      if: steps.pycheck.outputs.found != 'true'
      run: echo "No Python files found under Python/. Skipping."
