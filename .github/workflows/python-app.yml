name: Python application

on:
  push:
    branches: ["master"]
    paths:
      - "Python/**"
      - "requirements.txt"
      - "Python/requirements.txt"
      - ".github/workflows/python-app.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "Python/**"
      - "requirements.txt"
      - "Python/requirements.txt"
      - ".github/workflows/python-app.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Python files
        id: pycheck
        shell: bash
        run: |
          if [ -d "Python" ] && find Python -type f -name "*.py" | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Python files found under Python/."
          fi

      - name: Set up Python 3.10
        if: steps.pycheck.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: steps.pycheck.outputs.found == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "Python/requirements.txt" ]; then
            pip install -r Python/requirements.txt
          fi

      - name: Lint with flake8
        if: steps.pycheck.outputs.found == 'true'
        shell: bash
        run: |
          find Python -type f -name "*.py" -print0 | xargs -0 flake8 --count --select=E9,F63,F7,F82 --show-source --statistics || true
          find Python -type f -name "*.py" -print0 | xargs -0 flake8 --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Test with pytest
        if: steps.pycheck.outputs.found == 'true'
        shell: bash
        run: |
          if find Python -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest Python || true
          else
            echo "No pytest test files found. Skipping tests."
          fi

      - name: Skip when no Python files exist
        if: steps.pycheck.outputs.found != 'true'
        run: echo "No Python files found under Python/. Skipping."
