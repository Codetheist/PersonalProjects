# cmake-multi-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
    paths:
      - 'C/**'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake-multi-platform.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'C/**'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake-multi-platform.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Find CMake project
      id: cmake
      shell: bash
      run: |
        cmake_file="$(find C -name CMakeLists.txt | head -n 1)"
        if [ -n "$cmake_file" ]; then
          project_dir="$(dirname "$cmake_file")"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "build_dir=$project_dir/build" >> "$GITHUB_OUTPUT"
          echo "Found CMake project in $project_dir"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No CMakeLists.txt found under C/"
        fi

    - name: Configure CMake
      if: steps.cmake.outputs.found == 'true'
      run: >
        cmake -S "${{ steps.cmake.outputs.project_dir }}"
        -B "${{ steps.cmake.outputs.build_dir }}"
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      if: steps.cmake.outputs.found == 'true'
      run: cmake --build "${{ steps.cmake.outputs.build_dir }}" --config ${{ matrix.build_type }}

    - name: Test
      if: steps.cmake.outputs.found == 'true'
      working-directory: ${{ steps.cmake.outputs.build_dir }}
      run: ctest --build-config ${{ matrix.build_type }} || true

    - name: Skip when no CMake project exists
      if: steps.cmake.outputs.found != 'true'
      run: echo "No CMake project found under C/. Skipping."
