name: Close Snyk PRs
on:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close all open Snyk PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 3000 \
            --json number,title \
            --jq '.[] | select(.title | startswith("[Snyk]")) | .number' \
          | while read -r pr; do
              if gh pr close "$pr" --repo "$GITHUB_REPOSITORY" --delete-branch; then
                echo "closed #$pr"
              else
                echo "skip #$pr"
              fi
              sleep 1
            done