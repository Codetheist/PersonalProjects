name: Update README

on:
  push:
    branches: [master]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.README_PUSH_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Regenerate the Projects section
        run: node scripts/update-readme.mjs

      - name: Commit changes if the README changed
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name "Codetheist"
            git config user.email "56620151+Codetheist@users.noreply.github.com"

            git add README.md
            git commit -m "docs: auto-update project list in README"
            git push
          else
            echo "README already up to date, nothing to commit."
          fi
