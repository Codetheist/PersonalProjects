name: Update README

# Runs on any push to master (except pushes that only touch the README itself),
# regenerates the Projects section to mirror the whole repo, and commits it back.
on:
  push:
    branches: [master]
    paths-ignore:
      - "README.md"
  workflow_dispatch: # lets you trigger it by hand from the Actions tab

permissions:
  contents: write # required so the workflow can push the updated README

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git ls-files sees everything

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate the Projects section
        run: node scripts/update-readme.mjs

      - name: Commit changes if the README changed
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: auto-update project list in README"
            git push
          else
            echo "README already up to date, nothing to commit."
          fi