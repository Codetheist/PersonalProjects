name: C/C++ CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'C/**/*.c'
      - 'C/**/*.h'
      - 'C/**/*.cpp'
      - 'C/**/*.hpp'
      - 'C/**/configure'
      - 'C/**/Makefile'
      - '.github/workflows/c-cpp.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'C/**/*.c'
      - 'C/**/*.h'
      - 'C/**/*.cpp'
      - 'C/**/*.hpp'
      - 'C/**/configure'
      - 'C/**/Makefile'
      - '.github/workflows/c-cpp.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run configure/make if available
      shell: bash
      run: |
        if [ -x "C/configure" ]; then
          echo "Found executable C/configure. Running configure/make flow..."
          cd C
          ./configure
          make
          make check || true
          make distcheck || true
        else
          echo "No executable C/configure found. Skipping configure/make flow."
          echo "C/C++ files exist, but no root build system is set up in C/ yet."
        fi
