# static.yml
name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
    paths:
      - 'Website/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Website folder
        id: sitecheck
        shell: bash
        run: |
          if [ -d "Website" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Website folder not found."
          fi

      - name: Setup Pages
        if: steps.sitecheck.outputs.found == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.sitecheck.outputs.found == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'Website'

      - name: Deploy to GitHub Pages
        if: steps.sitecheck.outputs.found == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Skip when Website folder does not exist
        if: steps.sitecheck.outputs.found != 'true'
        run: echo "Website folder not found. Skipping."
