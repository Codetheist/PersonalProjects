# eslint.yml
name: ESLint

on:
  push:
    branches: [ "master" ]
    paths:
      - 'Website/**/*.js'
      - 'Website/**/*.jsx'
      - 'Website/**/*.ts'
      - 'Website/**/*.tsx'
      - 'Template/**/*.js'
      - 'Template/**/*.jsx'
      - 'Template/**/*.ts'
      - 'Template/**/*.tsx'
      - 'DevProjects/**/*.js'
      - 'DevProjects/**/*.jsx'
      - 'DevProjects/**/*.ts'
      - 'DevProjects/**/*.tsx'
      - '.eslintrc.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/eslint.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'Website/**/*.js'
      - 'Website/**/*.jsx'
      - 'Website/**/*.ts'
      - 'Website/**/*.tsx'
      - 'Template/**/*.js'
      - 'Template/**/*.jsx'
      - 'Template/**/*.ts'
      - 'Template/**/*.tsx'
      - 'DevProjects/**/*.js'
      - 'DevProjects/**/*.jsx'
      - 'DevProjects/**/*.ts'
      - 'DevProjects/**/*.tsx'
      - '.eslintrc.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/eslint.yml'
  workflow_dispatch:
  schedule:
    - cron: '16 20 * * 1'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check ESLint setup
        id: eslintcheck
        shell: bash
        run: |
          if [ -f "package.json" ] && [ -f ".eslintrc.js" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Missing package.json or .eslintrc.js."
          fi

      - name: Install ESLint
        if: steps.eslintcheck.outputs.found == 'true'
        run: |
          npm install eslint@8.10.0
          npm install @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        if: steps.eslintcheck.outputs.found == 'true'
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          npx eslint . \
            --config .eslintrc.js \
            --ext .js,.jsx,.ts,.tsx \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload analysis results to GitHub
        if: steps.eslintcheck.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true

      - name: Skip when ESLint is not configured
        if: steps.eslintcheck.outputs.found != 'true'
        run: echo "ESLint is not configured at repo root. Skipping."
