<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/assets/css/style.css">
	<title>Projects</title>
</head>

<body id="top">
	<a href="#main-content">Skip to main content</a>

	<header class="site-header">
		<nav class="navBar" aria-label="Primary">
			<div class="nav-brand">
				<span class="brand-mark">PF</span>
				<span class="brand-name">ProjectForge</span>
			</div>
			
			<div class="nav-actions">
				<button id="createProjectButton" class="buttonLook primaryButton btn btn-small">+ New project</button>
				<a href="/account" class="user-avatar-link" id="userAvatarBtn" aria-label="Account settings"></a>
			</div>
		</nav>
	</header>
	
	<main id="main-content" class="project-page">
		<div class="navLinks">
			<a href="/dashboard">&lt;&lt; Back to Dashboard</a>
		</div>
		<div class="project-layout">
			<section class="project-main" aria-label="Project content">
				<!-- Project header -->
				<section id="projectDetail" class="card projectHeader project-summary-card" role="region" aria-label="Project details">
					<header class="card-header">
						<h1 id="projectName"></h1>
						<div class="projectActions card-actions-inline" role="group" aria-label="Project actions">
							<button id="editProjectButton" class="buttonLook btn btn-small">Edit</button>
							<button id="deleteProjectButton" class="buttonLook btn btn-small secondaryButton btn-danger">Delete</button>
						</div>
					</header>
					
					<div class="card-body">
						<p id="projectDescription"></p>
						<p>
							<strong>Status:</strong>
							<span id="projectStatus"></span>
						</p>
						<p>
							<strong>Due Date:</strong>
							<span id="projectDueDate"></span>
						</p>
						<p id="projectDetailError" class="errorMessage"></p>
					</div>
					
					<form id="editProjectForm" class="projectForm card-form" hidden>
						<label for="editProjectName">Project Name:</label>
						<input type="text" id="editProjectName" name="name" required>
						
						<label for="editProjectDescription">Description:</label>
						<textarea id="editProjectDescription" name="description"></textarea>
						
						<label for="editProjectStatus">Status:</label>
						<select id="editProjectStatus" name="status">
							<option value="active">Active</option>
							<option value="completed">Completed</option>
							<option value="archived">Archived</option>
						</select>
						
						<label for="editProjectDueDate">Due Date:</label>
						<input type="date" id="editProjectDueDate" name="due_date">
						
						<div class="formActions">
							<button type="submit" class="buttonLook primaryButton btn">Save Changes</button>
							<button type="button" id="cancelEditButton" class="buttonLook secondaryButton btn">Cancel</button>
						</div>
						
						<p id="editProjectError" class="errorMessage"></p>
					</form>
				</section>
				
				<!-- Members section -->
				<section class="card projectMembers project-members-card" role="region" aria-labelledby="membersTitle">
					<header class="card-header">
						<h2 id="membersTitle">Team Members</h2>
						<button id="showAddMemberFormButton" class="buttonLook btn btn-small" hidden>Add Member</button>
					</header>
					
					<div id="membersList" class="data-list"></div>
					
					<form id="addMemberForm" class="memberForm card-form" hidden>
						<label for="memberUsername">Username:</label>
						<input type="text" id="memberUsername" name="username" required>
						
						<label for="memberRole">Role:</label>
						<select id="memberRole" name="role">
							<option value="admin">Admin</option>
							<option value="member" selected="selected">Member</option>
						</select>
						
						<div class="formActions">
							<button type="submit" class="buttonLook primaryButton btn">Add Member</button>
							<button type="button" id="cancelAddMemberButton" class="buttonLook secondaryButton btn">Cancel</button>
						</div>
						
						<p id="addMemberError" class="errorMessage"></p>
					</form>
				</section>
				
				<!-- Tasks section -->
				<section class="card projectTasks project-tasks-card" role="region" aria-labelledby="tasksTitle">
					<header class="card-header">
						<h2 id="tasksTitle">Tasks</h2>
						<button type="button" id="showCreateTaskFormButton" class="buttonLook btn btn-small">
							Add Task
						</button>
					</header>
					
					<div id="tasksList" class="data-list"></div>
					
					<form id="createTaskForm" class="taskForm card-form" hidden>
						<label for="taskTitle">Title:</label>
						<input type="text" id="taskTitle" name="title" required>
						
						<label for="taskDescription">Description:</label>
						<textarea id="taskDescription" name="description"></textarea>
						
						<label for="taskStatus">Status:</label>
						<select id="taskStatus" name="status">
							<option value="todo" selected="selected">To Do</option>
							<option value="doing">Doing</option>
							<option value="done">Done</option>
						</select>
						
						<label for="taskPriority">Priority:</label>
						<select id="taskPriority" name="priority">
							<option value="low">Low</option>
							<option value="medium" selected="selected">Medium</option>
							<option value="high">High</option>
						</select>
						
						<label for="taskAssignedTo">Assign To:</label>
						<select id="taskAssignedTo" name="assigned_to">
							<option value="">Unassigned</option>
						</select>
						
						<label for="taskDueDate">Due Date:</label>
						<input type="date" id="taskDueDate" name="due_date">
						
						<div class="formActions">
							<button type="submit" class="buttonLook primaryButton btn">Create Task</button>
							<button type="button" id="cancelCreateTaskButton" class="buttonLook secondaryButton btn">Cancel</button>
						</div>
						
						<p id="createTaskError" class="errorMessage"></p>
					</form>
					
					<!-- Task details panel -->
					<div id="taskDetailPanel" class="task-detail-panel" hidden>
						<div id="taskDetailInfo">
							<header class="card-header">
								<h3 id="taskDetailTitle"></h3>
								<div class="taskActions card-actions-inline" role="group" aria-label="Task actions"></div>
							</header>
							
							<p id="taskDetailDescription"></p>
							
							<p>
								<strong>Status:</strong>
								<span id="taskDetailStatus"></span>
							</p>
							
							<p>
								<strong>Priority:</strong>
								<span id="taskDetailPriority"></span>
							</p>
							
							<p>
								<strong>Assigned:</strong>
								<span id="taskDetailAssignedTo"></span>
							</p>
							
							<p>
								<strong>Due Date:</strong>
								<span id="taskDetailDueDate"></span>
							</p>
						</div>
						
						<form id="editTaskForm" class="taskForm card-form" hidden>
							<label for="editTaskTitle">Title:</label>
							<input type="text" id="editTaskTitle" name="title" required>
							
							<label for="editTaskDescription">Description:</label>
							<textarea id="editTaskDescription" name="description"></textarea>
							
							<label for="editTaskStatus">Status:</label>
							<select id="editTaskStatus" name="status">
								<option value="todo">To Do</option>
								<option value="doing">Doing</option>
								<option value="done">Done</option>
							</select>
							
							<label for="editTaskPriority">Priority:</label>
							<select id="editTaskPriority" name="priority">
								<option value="low">Low</option>
								<option value="medium">Medium</option>
								<option value="high">High</option>
							</select>
							
							<label for="editTaskAssignedTo">Assign To:</label>
							<select id="editTaskAssignedTo" name="assigned_to">
								<option value="">Unassigned</option>
							</select>
							
							<label for="editTaskDueDate">Due Date:</label>
							<input type="date" id="editTaskDueDate" name="due_date">
							
							<div class="formActions">
								<button type="submit" class="buttonLook primaryButton btn">Save Changes</button>
								<button type="button" id="cancelEditTaskButton" class="buttonLook secondaryButton btn">Cancel</button>
							</div>
							
							<p id="editTaskError" class="errorMessage"></p>
						</form>
					</div>
				</section>
			</section>
			
			<!-- Comments sidebar -->
			<aside class="project-sidebar" aria-labelledby="commentsTitle">
				<section class="card comments-panel taskComments" role="region" aria-labelledby="commentsTitle">
					<header class="comments-header">
						<h2 id="commentsTitle"></h2>
					</header>
					
					<div
						id="commentsList"
						class="comments-list"
						role="log"
						aria-live="polite"
						aria-relevant="additions"
					></div>
					
					<form id="addCommentForm" class="commentForm comment-form">
						<label for="commentContent">Add a comment:</label>
						
						<textarea
							id="commentContent"
							name="body"
							required
							placeholder="Write a comment..."
						></textarea>
						
						<button type="submit" class="buttonLook primaryButton btn">Submit Comment</button>
						
						<p id="addCommentError" class="errorMessage"></p>
					</form>
				</section>
			</aside>
		</div>
	</main>
	
	<footer class="site-footer">
		<a class="backToTop" href="#top">Back to Top</a>
		<p class="copyright">&copy; <span id="year"></span> Project Forge</p>
	</footer>
	
	<script type="module" src="/assets/js/core/app.js"></script>
</body>
</html>
